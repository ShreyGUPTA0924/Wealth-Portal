services:
  # Node.js Express Server
  - type: web
    name: wealth-portal-server
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Must be provided by user in Render Dashboard
      - key: JWT_SECRET
        sync: false # Must be provided by user in Render Dashboard
      - key: REDIS_URL
        sync: false # Must be provided by user in Render Dashboard
      - key: AI_SERVICE_URL
        value: https://wealth-portal-ai.onrender.com

  # FastAPI Python Server
  - type: web
    name: wealth-portal-ai
    env: python
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: GEMINI_API_KEY
        sync: false # Must be provided by user in Render Dashboard
